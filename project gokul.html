<!DOCTYPE html>
<html>

<head>
    <script>
        function validform() {
            var username = document.getElementById("fname").value;

            if (username === "") {
                alert("Please enter your name");
                return false;
            }

            return true;
        }
    </script>
    <style>
        h1 {
            color: black;
        }

        body {
            margin: 0;
            height: 100vh;
            background-image: url("pro4.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            color: white;
            position: absolute;
            top: 20px;
            left: 50%;

        }

        .btn-container {
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            transform: translateY(-10px) scale(1.05);
        }

        button {
            width: 200px;
            padding: 7px;
            margin-top: 7px;
            border-radius: 8px;
            background: linear-gradient(135deg, #072dd5, #7425c2, #e4092d);
            color: white;
            gap: 20px;
            cursor: pointer;
        }

        button:hover {
            transform: translate(-5px);
        }
    </style>
</head>

<head>

    </div>
